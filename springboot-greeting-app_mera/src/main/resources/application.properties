spring.application.name=springboot-greeting-app

# Server Settings
server.port=${PORT:8080}
server.servlet.context-path=/api
# H2 Database Connection details (Loaded dynamically from environment / .env)
spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Enable H2 Web Console (Accessible at http://localhost:8080/api/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
# Logging Configurations (SLF4J / Logback integration)
logging.level.root=INFO
logging.level.com.greet=DEBUG
logging.level.org.hibernate.SQL=DEBUG
# Custom JWT configuration properties (Loaded dynamically from environment / .env)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}
# Springdoc OpenAPI / Swagger UI Configurations (Accessible at
http://localhost:8080/api/swagger-ui.html)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha