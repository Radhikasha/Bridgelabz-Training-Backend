# ============================================================
# Spring Datasource - H2 In-Memory
# ============================================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=Radhika@2005

# ============================================================
# H2 Console
# ============================================================
# h2 open krega
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#defaukt m to bs localhost acces krega true h to koyi bhi machine access
spring.h2.console.settings.web-allow-others=true

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
#Hibernate jo SQL generate karta hai wo console me show karega.
spring.jpa.show-sql=true
#SQL ko readable format me print karta hai.
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT Configuration
# ============================================================
jwt.secret=85a9f7e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918
jwt.expiration=86400

# ============================================================
# Logging (Log4j2)
# ============================================================
logging.config=classpath:log4j2.xml

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.api-docs.path=/v3/api-docs